<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .fav-bg { fill: #ffffff; stroke: #e6e8eb; }
        .fav-stroke { stroke: #1b1f23; }
        .fav-fill { fill: #1b1f23; }
      }
      @media (prefers-color-scheme: dark) {
        .fav-bg { fill: #0d1117; stroke: #30363d; }
        .fav-stroke { stroke: #e6edf3; }
        .fav-fill { fill: #e6edf3; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="12" class="fav-bg" stroke-width="0.5"/>
  
  <!-- Concentric circles -->
  <circle cx="32" cy="32" r="18" fill="none" class="fav-stroke" stroke-width="0.7" opacity="0.25"/>
  <circle cx="32" cy="32" r="11" fill="none" class="fav-stroke" stroke-width="0.7" opacity="0.35"/>
  
  <!-- Center point -->
  <circle cx="32" cy="32" r="4" class="fav-fill" opacity="0.9"/>
  
  <!-- Cardinal points -->
  <circle cx="32" cy="14" r="1.8" class="fav-fill" opacity="0.5"/>
  <circle cx="50" cy="32" r="1.8" class="fav-fill" opacity="0.5"/>
  <circle cx="32" cy="50" r="1.8" class="fav-fill" opacity="0.5"/>
  <circle cx="14" cy="32" r="1.8" class="fav-fill" opacity="0.5"/>
</svg>
